<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="theme-color" content="#001f4d">
  <title>{% if page.title %}{{ page.title }} — ARIA{% else %}{{ site.title }}{% endif %}</title>

  <!-- OpenGraph -->
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="ARIA">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} — ARIA{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ '/og-image.png' | absolute_url }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }} — ARIA{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">

  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='78' font-size='80' font-weight='700' fill='%23c75146'%3EA%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="logo">ARIA<span>.</span></a>
    <nav>
      <a href="{{ '/tutorial.html' | relative_url }}">Tutorial</a>
      <a href="{{ '/cli-reference.html' | relative_url }}">CLI</a>
      <a href="{{ '/reference.html' | relative_url }}">Language</a>
      <a href="{{ '/examples.html' | relative_url }}">Examples</a>
      <a href="https://github.com/aria-lang/aria">GitHub</a>
    </nav>
  </div>
</header>

<main class="container" style="padding-top: 2rem; padding-bottom: 3rem; max-width: 820px;">
  {{ content }}
</main>

<footer class="site-footer">
  <div class="container">
    <div>ARIA is MIT-licensed. Built for the AI-driven development era.</div>
    <div>
      <a href="https://github.com/aria-lang/aria">GitHub</a> ·
      <a href="https://www.npmjs.com/package/aria-lang">npm</a> ·
      <a href="https://github.com/aria-lang/aria/blob/main/CHANGELOG.md">Changelog</a>
    </div>
  </div>
</footer>

</body>
</html>
