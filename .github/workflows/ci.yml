name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Verify CLI runs
        run: node dist/cli.js --version

      # Validate example specs using the freshly-built CLI on the Node 20 leg only
      # — avoids re-installing/building in a separate job downstream.
      - name: Check example specs (Node 20 only)
        if: matrix.node == '20'
        run: |
          node dist/cli.js check examples/auth.aria
          node dist/cli.js check examples/payment.aria

      - name: Generate all targets from auth.aria (Node 20 only)
        if: matrix.node == '20'
        run: |
          node dist/cli.js gen examples/auth.aria --target typescript -o /tmp/aria-out-ts
          node dist/cli.js gen examples/auth.aria --target rust -o /tmp/aria-out-rust
          node dist/cli.js gen examples/auth.aria --target python -o /tmp/aria-out-py
          node dist/cli.js gen examples/auth.aria --target jsonschema -o /tmp/aria-out-js
